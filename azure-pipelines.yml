# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  - group: KeyVaultVariables

steps:
  # 1. Checkout GitHub
  - checkout: self

  # 2. Sync GitHub -> Azure Repos
  - script: |
      set -e
      echo "Cloning GitHub as mirror..."
      git clone --mirror https://github.com/itregit/project-01.git
      cd project-01.git
      echo "Pushing to Azure Repos..."
      git remote add azure https://git:$(azure-devops-pat)@dev.azure.com/if25b203/project-01/_git/project-01
      git push --mirror azure
    displayName: "Sync GitHub → Azure Repos"

  # 3. Build
  - script: |
      echo "Build step"
      # npm install / mvn package
    displayName: "Build"

  # 4. Test
  - script: |
      echo "Test step"
    displayName: "Test"

  # 5. Deploy
  - script: |
      echo "Deploy step"
    displayName: "Deploy"