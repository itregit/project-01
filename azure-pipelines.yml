# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  - group: KeyVaultVariables

resources:
  repositories:
    - repository: githubRepo
      type: github
      name: itregit/project-01

steps:
  # 1. Checkout GitHub
  - checkout: githubRepo

  # 2. Build
  - script: |
      echo "Build step"
      # npm install / mvn package
    displayName: "Build"

  # 3. Test
  - script: |
      echo "Test step"
    displayName: "Test"

  # 4. Deploy
  - script: |
      echo "Deploy step"
    displayName: "Deploy"